      #     index.php
      #     php.ini
      #     robots.txt
      #     routes.php
      #     sitemap.xml

    # NUEVO: Cachear el estado del servidor FTP
    - name: 📦 Cache FTP Deploy State
      uses: actions/cache@v4
      with:
        path: .ftp-deploy-sync-state.json
        key: ftp-state-${{ github.sha }}
        restore-keys: |
          ftp-state-

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.volatil.cl
        username: ${{ secrets.ftp_user }}
        password: ${{ secrets.ftp_password }}
        protocol: ftps
        port: 21
        log-level: minimal  # Cambiado de 'standard' a 'minimal'
        exclude: |
          .git*/**
          logs.log
          db/**
          AGENTS.md
          DESIGN.md
          .codex/*